name: Publish to Nuget

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write # required for OIDC token issuance used by NuGet trusted publishing

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Restore dependencies
        run: dotnet restore
      - name: Build
        run: dotnet build BigMission.Shared/BigMission.Shared.csproj --no-restore --configuration Release
      - name: Create the package
        run: dotnet pack BigMission.Shared/BigMission.Shared.csproj --configuration Release
      - name: NuGet login (OIDC -> temp API key)
        uses: NuGet/login@v1
        id: login
        with:
          user: bgriggsbmm
      - name: Publish the package to Nuget
        run: dotnet nuget push BigMission.Shared\bin\Release\*.nupkg -s https://api.nuget.org/v3/index.json --api-key ${{steps.login.outputs.NUGET_API_KEY}} --skip-duplicate
